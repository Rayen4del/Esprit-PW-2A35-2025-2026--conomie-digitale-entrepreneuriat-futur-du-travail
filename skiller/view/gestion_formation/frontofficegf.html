<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nexo — Structure</title>
</head>

<body>

<!-- ================= BACK OFFICE ================= -->
<div id="backApp" class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">nexo.</div>

    <nav>
      <div>Vue d'ensemble</div>
      <div>Messages</div>
      <div>Explorer</div>
      <div>Mes fichiers</div>
      <div>Mon profil</div>
      <div>Facturation</div>
    </nav>

    <div class="sidebar-footer">
      <div>Utilisateur</div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div>Vue d'ensemble</div>
      <div>
        <button onclick="openModal()">+ Nouveau projet</button>
        <button onclick="showFront()">Front office</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- METRICS -->
      <section id="metrics"></section>

      <!-- CHARTS -->
      <section id="charts"></section>

      <!-- PROJECTS -->
      <section id="projects"></section>

    </div>
  </div>
</div>


<!-- ================= FRONT OFFICE ================= -->
<div id="frontApp" class="front">

  <!-- NAV -->
  <nav class="front-nav">
    <div class="logo">nexo.</div>

    <div>
      <span onclick="showFrontPage('home')">Accueil</span>
      <span onclick="showFrontPage('explore')">Explorer</span>
      <span>Prestataires</span>
      <span>Tarifs</span>
    </div>

    <div>
      <button onclick="showBack()">Back office</button>
      <button>Connexion</button>
    </div>
  </nav>

  <!-- FRONT BODY -->
  <div class="front-body">

    <!-- HOME -->
    <section id="frontHome">
      <div>Hero Section</div>
      <div>Stats</div>
      <div>Footer</div>
    </section>

    <!-- EXPLORE -->
    <section id="frontExplore">
      <div>Search bar</div>
      <div>Filters</div>
      <div>Services grid</div>
    </section>

    <!-- REGISTER -->
    <section id="frontRegister">
      <div>Form prestataire</div>
    </section>

  </div>
</div>


<!-- ================= MODAL ================= -->
<div id="modalNewProject">
  <div class="modal">
    <div class="modal-header">Nouveau projet</div>

    <div class="modal-body">
      <form>
        <input placeholder="Nom projet"/>
        <select></select>
        <textarea></textarea>
        <input type="date"/>
        <input type="range"/>
        <button>Créer</button>
      </form>
    </div>
  </div>
</div>


<!-- ================= SCRIPT ================= -->
<script>
function showFront(){
  document.getElementById("backApp").style.display="none";
  document.getElementById("frontApp").style.display="flex";
}

function showBack(){
  document.getElementById("frontApp").style.display="none";
  document.getElementById("backApp").style.display="flex";
}

function showFrontPage(page){
  document.getElementById("frontHome").style.display = page==="home"?"block":"none";
  document.getElementById("frontExplore").style.display = page==="explore"?"block":"none";
  document.getElementById("frontRegister").style.display = page==="register"?"block":"none";
}

function openModal(){
  document.getElementById("modalNewProject").style.display="block";
}
</script>

</body>
</html>
